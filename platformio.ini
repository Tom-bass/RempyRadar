[env:seeed_xiao_esp32s3]
platform                        = espressif32
board                           = seeed_xiao_esp32s3
framework                       = arduino
board_build.arduino.memory_type = qio_opi
board_build.partitions          = partitions.csv
upload_speed                    = 921600
monitor_speed                   = 115200
build_flags                     = -DARDUINO_USB_CDC_ON_BOOT=1 -DARDUINO_USB_MODE=1
extra_scripts                   =
    pre:scripts/version.py
    pre:scripts/gen_html.py

lib_deps =
    adafruit/Adafruit GC9A01A@^1.0.0
    adafruit/Adafruit GFX Library@^1.11.0
    adafruit/Adafruit MMC56x3@^1.0.1
    adafruit/Adafruit Unified Sensor@^1.1.0
    bblanchon/ArduinoJson@^6.21.5
